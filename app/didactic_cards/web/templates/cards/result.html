<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Предпросмотр LaTeX</title>
    <link rel="stylesheet" href="{{ url_for('cards.static', filename='cards/style.css') }}">
</head>
<body>
    <h1>👁 Предпросмотр LaTeX-кода</h1>

    <pre id="latex-code">{{ latex_content }}</pre>

    <div class="buttons">
        <a href="{{ url_for('cards.index') }}" class="btn btn-secondary">← Назад к карточкам</a>
        <button class="btn btn-copy" onclick="copyLatex()">📋 Копировать код</button>
    </div>

    <script>
        function copyLatex() {
            const code = document.getElementById('latex-code').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('LaTeX-код скопирован в буфер обмена!');
            });
        }
    </script>
</body>
</html>
