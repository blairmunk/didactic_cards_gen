<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактирование карточки</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            color: #333;
        }
        h1 { color: #2c3e50; }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        textarea {
            width: 100%;
            height: 140px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        .buttons {
            display: flex;
            gap: 10px;
        }
        button, .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 15px;
            text-decoration: none;
            display: inline-block;
            color: white;
        }
        .btn-primary   { background-color: #4CAF50; }
        .btn-secondary { background-color: #95a5a6; }
    </style>
</head>
<body>
    <h1>✏️ Редактирование карточки №{{ index + 1 }}</h1>

    <form action="/edit_card/{{ index }}" method="post">
        <label for="front">Лицевая сторона (задание):</label>
        <textarea name="front" id="front">{{ card.front }}</textarea>

        <label for="back">Оборотная сторона (решение):</label>
        <textarea name="back" id="back">{{ card.back }}</textarea>

        <div class="buttons">
            <button type="submit" class="btn-primary">💾 Сохранить</button>
            <a href="/" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</body>
</html>
